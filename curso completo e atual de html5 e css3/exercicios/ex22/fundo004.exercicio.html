<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 004</title>
    <style>
        div.bonequinho {
            display: inline-block;
            border: 2px solid black;
            background-color: lightgray;
            border-radius: 10px;
            width: 100px;
            height: 100px;
        }

        div#b1 {
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-position: left top;
        }
        
        div#b2 {
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-position: left center;
        }

        div#b3 {
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            background-position: right bottom;
        }

        div#b4 {
            background-position: center center;
        }
    </style>
</head>
<body>
    <div class="bonequinho" id="b1">
    </div>

    <div class="bonequinho" id="b2">
    </div>

    <div class="bonequinho" id="b3">
    </div>

    <div class="bonequinho" id="b4">
    </div>
</body>
</html>
