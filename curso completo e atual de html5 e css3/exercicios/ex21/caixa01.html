<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: rgb(132 96 165);
            height: 40px;
            width: 912px;

            border: 7px solid rgb(217, 176, 255);

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed aqua;

        }

        a {

            border: 4px solid #38ddd891;
            
            padding: 10px;

        }
    </style
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
