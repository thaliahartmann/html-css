<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Responsivo</title>
    <style>

        /* VARIÁVEIS E RESET */
        :root {
            --cor-primaria: #3498db;
            --cor-fundo: #f0f0f0;
            --espacamento: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 1rem;
            background-color: var(--cor-fundo);
        }

        /* HEADER */
        #topo {
            background-color: var(--cor-primaria);
            color: white;
            padding: var(--espacamento);
            text-align: center;
        }

        #topo h1 {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
        }

        /* NAV */
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 10px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
        }

        /* MAIN */
        #principal {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--espacamento);
            padding: var(--espacamento);
        }

        /* CARDS */
        .noticia {
            background: white;
            border: 1px solid var(--cor-primaria);
            border-radius: 8px;
            padding: var(--espacamento);
        }

        /* IMAGEM */
        img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* FOOTER */
        footer {
            background-color: var(--cor-primaria);
            color: white;
            text-align: center;
            padding: var(--espacamento);
        }

        /* TABLET */
        @media (min-width: 768px) {
            #principal {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* DESKTOP */
        @media (min-width: 1024px) {
            #principal {
                grid-template-columns: repeat(3, 1fr);
            }
        }

    </style>
</head>
<body>

    <header id="topo">
        <h1>Meu Site</h1>
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main id="principal">
        <article class="noticia">
            <img src="foto1.png" alt="Notícia 1">
            <h2>Notícia 1</h2>
            <p>Conteúdo da notícia...</p>
        </article>
        <article class="noticia">
            <img src="foto2.png" alt="Notícia 2">
            <h2>Notícia 2</h2>
            <p>Outro conteúdo...</p>
        </article>
        <article class="noticia">
            <img src="foto3.png" alt="Notícia 3">
            <h2>Notícia 3</h2>
            <p>Mais um conteúdo...</p>
        </article>
    </main>

    <footer>
        <p>© 2026</p>
    </footer>

</body>
</html>
