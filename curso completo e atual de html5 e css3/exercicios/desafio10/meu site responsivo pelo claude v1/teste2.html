
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo</title>
    <style>
        #topo {
            background-color: lightgray;
        }

        .menu {
            color: blue;
        }

        .noticia {
            border: 1px solid black;
            padding: 10px;
        }

        #principal {
            background-color: lightyellow;
        }
    </style>
</head>
<body>
    <header id="topo">
        <h1>Meu Site</h1>
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <main id="principal">
        <section>
            <article class="noticia">
                <h2>Notícia 1</h2>
                <p>Conteúdo da notícia...</p>
            </article>
            <article class="noticia">
                <h2>Notícia 2</h2>
                <p>Outro conteúdo...</p>
            </article>
        </section>
        <aside>
            <p>Publicidade</p>
        </aside>
    </main>
    <footer>
        <p>© 2026</p>
    </footer>
</body>
</html>
